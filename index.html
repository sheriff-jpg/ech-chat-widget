<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>El Cerrito Honda – AI Chat</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f4f6f9;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    /* ── Chat Bubble ── */
    #chat-bubble {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 60px;
      height: 60px;
      background: #007CC3;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,124,195,0.4);
      z-index: 1000;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    #chat-bubble:hover {
      transform: scale(1.08);
      box-shadow: 0 6px 20px rgba(0,124,195,0.5);
    }
    #chat-bubble svg { width: 28px; height: 28px; fill: white; }

    /* ── Chat Window ── */
    #chat-window {
      position: fixed;
      bottom: 96px;
      right: 24px;
      width: 380px;
      max-height: 580px;
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.15);
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 999;
      animation: slideUp 0.25s ease;
    }
    #chat-window.open { display: flex; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── Header ── */
    #chat-header {
      background: linear-gradient(135deg, #007CC3, #005a8e);
      color: white;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    #chat-header .avatar {
      width: 42px;
      height: 42px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      flex-shrink: 0;
    }
    #chat-header .info { flex: 1; }
    #chat-header .info .name { font-weight: 700; font-size: 15px; }
    #chat-header .info .status { font-size: 12px; opacity: 0.85; margin-top: 2px; }
    #chat-close {
      background: none;
      border: none;
      color: white;
      font-size: 22px;
      cursor: pointer;
      opacity: 0.8;
      padding: 4px;
      line-height: 1;
    }
    #chat-close:hover { opacity: 1; }

    /* ── Messages ── */
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      background: #f8fafd;
    }

    .msg {
      max-width: 80%;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 14px;
      line-height: 1.5;
      word-break: break-word;
    }
    .msg.bot {
      background: #fff;
      color: #1a1a2e;
      align-self: flex-start;
      border: 1px solid #e8edf5;
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .msg.user {
      background: #007CC3;
      color: white;
      align-self: flex-end;
      border-bottom-right-radius: 4px;
    }

    /* typing dots */
    .typing-dots {
      display: flex;
      gap: 5px;
      align-items: center;
      padding: 10px 14px;
      background: #fff;
      border: 1px solid #e8edf5;
      border-radius: 16px;
      border-bottom-left-radius: 4px;
      align-self: flex-start;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
    }
    .typing-dots span {
      width: 7px;
      height: 7px;
      background: #007CC3;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }

    /* ── Input Bar ── */
    #chat-input-area {
      display: flex;
      gap: 8px;
      padding: 12px 14px;
      border-top: 1px solid #e8edf5;
      background: #fff;
      flex-shrink: 0;
    }
    #chat-input {
      flex: 1;
      padding: 10px 14px;
      border: 1.5px solid #d0d8e8;
      border-radius: 24px;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
      background: #f8fafd;
    }
    #chat-input:focus { border-color: #007CC3; background: #fff; }
    #chat-send {
      width: 42px;
      height: 42px;
      background: #007CC3;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, transform 0.1s;
      flex-shrink: 0;
    }
    #chat-send:hover { background: #005a8e; transform: scale(1.05); }
    #chat-send:disabled { background: #b0c4d8; cursor: not-allowed; transform: none; }
    #chat-send svg { width: 18px; height: 18px; fill: white; }

    /* ── Quick Replies ── */
    .quick-replies {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      margin-top: 8px;
    }
    .quick-reply-btn {
      background: #e8f4fd;
      color: #007CC3;
      border: 1.5px solid #b3d9f2;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 500;
    }
    .quick-reply-btn:hover { background: #007CC3; color: white; border-color: #007CC3; }

    /* ── Forms ── */
    .chat-form {
      background: #fff;
      border: 1.5px solid #e8edf5;
      border-radius: 12px;
      padding: 14px;
      align-self: flex-start;
      max-width: 90%;
      box-shadow: 0 2px 8px rgba(0,0,0,0.06);
    }
    .chat-form h4 {
      color: #007CC3;
      font-size: 14px;
      margin-bottom: 10px;
      font-weight: 700;
    }
    .chat-form input {
      width: 100%;
      padding: 8px 12px;
      border: 1.5px solid #d0d8e8;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 8px;
      outline: none;
      transition: border-color 0.2s;
    }
    .chat-form input:focus { border-color: #007CC3; }
    .chat-form button {
      width: 100%;
      background: #007CC3;
      color: white;
      border: none;
      border-radius: 8px;
      padding: 9px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    .chat-form button:hover { background: #005a8e; }

    /* ── Link style ── */
    .msg a { color: #007CC3; text-decoration: underline; }
    .msg.user a { color: #cce8f8; }

    @media (max-width: 440px) {
      #chat-window { width: calc(100vw - 16px); right: 8px; bottom: 80px; }
    }
  </style>
</head>
<body>

<!-- Chat Bubble -->
<div id="chat-bubble" onclick="toggleChat()">
  <svg viewBox="0 0 24 24"><path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>
</div>

<!-- Chat Window -->
<div id="chat-window">
  <div id="chat-header">
    <div class="avatar">🚗</div>
    <div class="info">
      <div class="name">El Cerrito Honda</div>
      <div class="status">● Online – AI Assistant</div>
    </div>
    <button id="chat-close" onclick="toggleChat()">✕</button>
  </div>

  <div id="chat-messages"></div>

  <div id="chat-input-area">
    <input id="chat-input" type="text" placeholder="Ask us anything…" onkeydown="if(event.key==='Enter')sendMessage()" />
    <button id="chat-send" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
const QUICK_REPLIES = [
  "View inventory",
  "Schedule service",
  "Get a quote",
  "Trade-in value",
  "Hours & location"
];

let conversationHistory = [];
let chatOpen = false;

function toggleChat() {
  chatOpen = !chatOpen;
  const win = document.getElementById('chat-window');
  win.classList.toggle('open', chatOpen);
  if (chatOpen && conversationHistory.length === 0) {
    showWelcome();
  }
  if (chatOpen) {
    setTimeout(() => document.getElementById('chat-input').focus(), 100);
  }
}

function showWelcome() {
  const welcomeDiv = document.createElement('div');
  welcomeDiv.className = 'msg bot';
  welcomeDiv.innerHTML = `👋 Welcome to <strong>El Cerrito Honda</strong>! I'm here to help with inventory, service appointments, pricing, and more.<br><br>How can I help you today?`;
  document.getElementById('chat-messages').appendChild(welcomeDiv);

  const qr = document.createElement('div');
  qr.className = 'quick-replies';
  QUICK_REPLIES.forEach(text => {
    const btn = document.createElement('button');
    btn.className = 'quick-reply-btn';
    btn.textContent = text;
    btn.onclick = () => { qr.remove(); sendMessage(text); };
    qr.appendChild(btn);
  });
  document.getElementById('chat-messages').appendChild(qr);
  scrollToBottom();
}

async function sendMessage(overrideText) {
  const input = document.getElementById('chat-input');
  const text = overrideText || input.value.trim();
  if (!text) return;

  input.value = '';
  document.getElementById('chat-send').disabled = true;

  appendMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });

  const typing = showTyping();

  try {
    const res = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory })
    });
    const data = await res.json();
    typing.remove();

    if (data.reply) {
      const reply = data.reply;
      conversationHistory.push({ role: 'assistant', content: reply });
      processAndRenderReply(reply);
    } else {
      appendMessage('bot', 'Sorry, something went wrong. Please call us at (510) 860-4470.');
    }
  } catch (e) {
    typing.remove();
    appendMessage('bot', 'Connection error. Please try again or call (510) 860-4470.');
  }

  document.getElementById('chat-send').disabled = false;
  scrollToBottom();
}

function processAndRenderReply(reply) {
  // Check for special tags
  if (reply.includes('[SHOW_SERVICE_FORM]')) {
    const clean = reply.replace('[SHOW_SERVICE_FORM]', '').trim();
    if (clean) appendMessage('bot', clean);
    showServiceForm();
    return;
  }
  if (reply.includes('[SHOW_SALES_FORM]')) {
    const clean = reply.replace('[SHOW_SALES_FORM]', '').trim();
    if (clean) appendMessage('bot', clean);
    showSalesForm();
    return;
  }
  const inventoryMatch = reply.match(/\[SHOW_INVENTORY:\s*([^\]]+)\]/);
  if (inventoryMatch) {
    const clean = reply.replace(inventoryMatch[0], '').trim();
    if (clean) appendMessage('bot', clean);
    showInventoryLink(inventoryMatch[1].trim());
    return;
  }
  appendMessage('bot', reply);
}

function appendMessage(role, text) {
  const div = document.createElement('div');
  div.className = `msg ${role}`;
  // Convert URLs to links
  div.innerHTML = text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
  document.getElementById('chat-messages').appendChild(div);
  scrollToBottom();
}

function showTyping() {
  const div = document.createElement('div');
  div.className = 'typing-dots';
  div.innerHTML = '<span></span><span></span><span></span>';
  document.getElementById('chat-messages').appendChild(div);
  scrollToBottom();
  return div;
}

function showServiceForm() {
  const form = document.createElement('div');
  form.className = 'chat-form';
  form.innerHTML = `
    <h4>🔧 Schedule Service Appointment</h4>
    <input type="text" id="svc-name" placeholder="Your name" />
    <input type="tel" id="svc-phone" placeholder="Phone number" />
    <input type="email" id="svc-email" placeholder="Email address" />
    <input type="text" id="svc-vehicle" placeholder="Year, Make, Model" />
    <input type="text" id="svc-service" placeholder="Service needed" />
    <button onclick="submitServiceForm()">Request Appointment</button>
  `;
  document.getElementById('chat-messages').appendChild(form);
  scrollToBottom();
}

function showSalesForm() {
  const form = document.createElement('div');
  form.className = 'chat-form';
  form.innerHTML = `
    <h4>🚗 Connect with Sales</h4>
    <input type="text" id="sales-name" placeholder="Your name" />
    <input type="tel" id="sales-phone" placeholder="Phone number" />
    <input type="email" id="sales-email" placeholder="Email address" />
    <input type="text" id="sales-interest" placeholder="Vehicle you're interested in" />
    <button onclick="submitSalesForm()">Get in Touch</button>
  `;
  document.getElementById('chat-messages').appendChild(form);
  scrollToBottom();
}

function showInventoryLink(model) {
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.innerHTML = `🔍 <a href="https://www.elcerritohonda.com/new-inventory/index.htm?search=${encodeURIComponent(model)}" target="_blank">View ${model} inventory at El Cerrito Honda →</a>`;
  document.getElementById('chat-messages').appendChild(div);
  scrollToBottom();
}

function submitServiceForm() {
  const name = document.getElementById('svc-name').value.trim();
  const phone = document.getElementById('svc-phone').value.trim();
  const email = document.getElementById('svc-email').value.trim();
  const vehicle = document.getElementById('svc-vehicle').value.trim();
  const service = document.getElementById('svc-service').value.trim();
  if (!name || !phone) { alert('Please enter your name and phone number.'); return; }
  appendMessage('user', `Service request: ${name}, ${phone}, ${vehicle}, ${service}`);
  conversationHistory.push({ role: 'user', content: `I'd like to schedule service. Name: ${name}, Phone: ${phone}, Email: ${email}, Vehicle: ${vehicle}, Service needed: ${service}` });
  document.querySelector('.chat-form')?.remove();
  sendMessageFromHistory();
}

function submitSalesForm() {
  const name = document.getElementById('sales-name').value.trim();
  const phone = document.getElementById('sales-phone').value.trim();
  const email = document.getElementById('sales-email').value.trim();
  const interest = document.getElementById('sales-interest').value.trim();
  if (!name || !phone) { alert('Please enter your name and phone number.'); return; }
  appendMessage('user', `Contact request: ${name}, ${phone}, interested in ${interest}`);
  conversationHistory.push({ role: 'user', content: `I'd like to be contacted by sales. Name: ${name}, Phone: ${phone}, Email: ${email}, Interested in: ${interest}` });
  document.querySelector('.chat-form')?.remove();
  sendMessageFromHistory();
}

async function sendMessageFromHistory() {
  document.getElementById('chat-send').disabled = true;
  const typing = showTyping();
  try {
    const res = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: conversationHistory })
    });
    const data = await res.json();
    typing.remove();
    if (data.reply) {
      conversationHistory.push({ role: 'assistant', content: data.reply });
      processAndRenderReply(data.reply);
    }
  } catch(e) {
    typing.remove();
    appendMessage('bot', 'Thanks! Our team will be in touch shortly.');
  }
  document.getElementById('chat-send').disabled = false;
}

function scrollToBottom() {
  const msgs = document.getElementById('chat-messages');
  msgs.scrollTop = msgs.scrollHeight;
}
</script>
</body>
</html>
